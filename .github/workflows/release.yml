name: build-and-release

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for manual runs)"
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout game repository
        uses: actions/checkout@v4

      - name: Checkout Lobster runtime/compiler
        uses: actions/checkout@v4
        with:
          repository: aardappel/lobster
          path: lobster-src

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libsdl2-dev \
            libopenal-dev \
            zlib1g-dev

      - name: Build Lobster
        run: |
          cmake -S lobster-src -B lobster-src/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-O3 -static-libstdc++ -static-libgcc"
          cmake --build lobster-src/build --parallel

      - name: Build pak for the game
        run: |
          pushd lobster-src
          ./build/lobster --pak ../flypper_bird.lobster
          popd

      - name: Assemble release bundle
        run: |
          mkdir -p dist/data
          cp lobster-src/build/lobster dist/flypper-bird
          cp default.lpak dist/default.lpak
          cp -r lobster-src/data/shaders dist/data/
          cp README.md dist/README.md
          cp assets/preview.svg dist/preview.svg
          tar -czf flypper-bird-linux-x86_64.tar.gz -C dist .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: flypper-bird-linux-x86_64
          path: flypper-bird-linux-x86_64.tar.gz

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            flypper-bird-linux-x86_64.tar.gz
            assets/preview.svg
          generate_release_notes: true
