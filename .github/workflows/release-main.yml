name: Release main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v17
      - run: nix develop -c just prod
      - run: cp build/release/flypper-lobster-linux-x86_64.tar.gz .
      - name: Move main-latest tag
        run: |
          git tag -f main-latest "$GITHUB_SHA"
          git push -f origin main-latest
      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete main-latest --yes || true
          gh release create main-latest flypper-lobster-linux-x86_64.tar.gz \
            --title "main-latest" \
            --notes "Automated Linux x86_64 build for $GITHUB_SHA." \
            --prerelease \
            --target "$GITHUB_SHA"
