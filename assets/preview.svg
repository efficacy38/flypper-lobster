  <text x="58" y="82" font-family="Verdana, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">FLYPPER BIRD</text>
  <text x="62" y="126" font-family="Verdana, Arial, sans-serif" font-size="26" fill="#1b4f72">Lobster language demo preview</text>
