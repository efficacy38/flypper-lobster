    <ellipse cx="-12" cy="-10" rx="24" ry="17" fill="#ffef96" opacity="0.8"/>
    <polygon points="34,0 94,20 34,35" fill="#ff9827"/>
    <circle cx="-16" cy="-16" r="12" fill="#fff"/>
