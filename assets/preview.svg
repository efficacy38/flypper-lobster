  <rect width="1280" height="720" fill="url(#sky)"/>
  <ellipse cx="220" cy="120" rx="95" ry="34" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="1080" cy="170" rx="120" ry="38" fill="#ffffff" opacity="0.85"/>

  <rect x="0" y="640" width="1280" height="80" fill="#66b23f"/>
  <rect x="0" y="630" width="1280" height="14" fill="#86d35a"/>

  <g filter="url(#shadow)">
