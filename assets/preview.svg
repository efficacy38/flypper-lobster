    <rect x="792" y="300" width="166" height="30" rx="6" fill="#248b41"/>
    <rect x="810" y="470" width="130" height="250" fill="#2ca24e"/>
    <rect x="792" y="470" width="166" height="30" rx="6" fill="#248b41"/>

    <rect x="1060" y="0" width="130" height="250" fill="#2ca24e"/>
